# Curated "language-purity" probe suite for the embedding inference engine.
#
# Each case is a natural task description with human-labelled expectations:
#   expect.include  — traits that SHOULD be inferred (recall)
#   expect.forbid   — traits that must NOT be inferred (contamination)
#   kits_include    — kits that must appear in the resolution
#   kits_forbid     — kits that must NOT appear
#
# The headline target: monolingual tasks that leak into other languages, which
# then trip `excludes.languages` gates and silently drop kits.

cases:
  # --- Python-only: must not leak javascript/typescript --------------------
  - id: py-input-validation
    task: >-
      Add input validation to a Python FastAPI endpoint and write pytest tests
      for it.
    expect:
      include:
        languages: [python]
        frameworks: [fastapi]
      forbid:
        languages: [javascript, typescript]
    kits_include: [module-fastapi, module-code-style-python]

  - id: py-alembic-migration
    task: >-
      Write an Alembic migration to add a nullable column to a PostgreSQL table
      in our Python backend service.
    expect:
      include:
        languages: [python]
      forbid:
        languages: [javascript, typescript]
    kits_include: [module-database-postgresql, module-code-style-python]

  - id: py-asyncio-worker
    task: >-
      Refactor a Python asyncio background worker so it handles task
      cancellation and shutdown cleanly.
    expect:
      include:
        languages: [python]
      forbid:
        languages: [javascript, typescript]
    kits_include: [module-code-style-python]

  - id: py-pytest-coverage
    task: >-
      Improve our pytest fixtures and raise unit-test coverage in a pure Python
      library.
    expect:
      include:
        languages: [python]
      forbid:
        languages: [javascript, typescript]
    kits_include: [module-code-style-python]

  # --- Vue/TypeScript-only: must not leak python/fastapi -------------------
  - id: ts-vuetify-table
    task: >-
      Build a reusable Vuetify data-table component in our Vue 3 and TypeScript
      single-page app.
    expect:
      include:
        frameworks: [vue]
      forbid:
        languages: [python]
        frameworks: [fastapi]
    kits_include: [module-vue-vuetify]

  - id: ts-pkce-login
    task: >-
      Implement a PKCE OIDC login flow with token storage in our Vue
      single-page application frontend.
    expect:
      include:
        frameworks: [vue]
      forbid:
        languages: [python]
        frameworks: [fastapi]
    kits_include: [module-auth-oidc-vue]

  # --- Docs / release: should infer no programming language ---------------
  - id: docs-sphinx-rtd
    task: >-
      Restructure our Sphinx documentation and publish the guide to Read the
      Docs.
    expect:
      forbid:
        languages: [python, javascript, typescript]
    kits_include: [module-docs-sphinx]

  - id: release-calver-channels
    task: >-
      Set up CalVer release tagging with cascading moving channel pointers in
      GitHub Actions.
    expect:
      forbid:
        languages: [python, javascript, typescript]
    kits_include: [module-calver-release-channels]

  # --- Mixed full-stack CONTROLS: both languages are legitimate -----------
  # These guard against over-correction: a fix that suppresses cross-language
  # inference must NOT break genuinely full-stack tasks.
  - id: control-fullstack-feature
    task: >-
      Build a full-stack feature: a FastAPI REST endpoint plus the Vue and
      Vuetify UI that consumes it.
    expect:
      include:
        languages: [python]
        frameworks: [fastapi, vue]
    kits_include: [stack-fastapi-vuetify, module-fastapi]

  - id: control-fullstack-oidc
    task: >-
      Add end-to-end OIDC authentication: protect the FastAPI backend and add a
      login flow to the Vue frontend.
    expect:
      include:
        frameworks: [fastapi, vue]
    kits_include: [module-auth-oidc]

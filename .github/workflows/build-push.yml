name: Build & Push MCP server image

# Releases are CalVer-tag-driven and follow cascading channel pointers
# (module-calver-release-channels): pushing a tag vYYYY.M.D[-alpha.N|-beta.N|
# -rc.N] publishes the immutable full version plus the moving channel tags it
# advances (alpha ⊂ beta ⊂ stable). No unconditional `latest` is produced.
# Branch pushes to main run tests and validate the build, but publish nothing.
on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  # Publishes to GitHub Container Registry under this repository's namespace,
  # e.g. ghcr.io/<owner>/quartermaster.
  IMAGE: ghcr.io/${{ github.repository_owner }}/quartermaster

jobs:
  test:
    name: Test
    uses: ./.github/workflows/testing.yml

  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    # Never publish unless the backend + web-UI tests (and the dev-auth
    # dead-code-elimination guard) pass first.
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Derive the moving channel pointers this release advances (cascade by
      # maturity: stable ⊃ beta ⊃ alpha). Tag pushes only — branch builds
      # publish nothing, so they need no channels.
      - name: Derive release channels
        id: channels
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          channels="$(sh scripts/derive_channels.sh)"
          echo "channels=$channels" >> "$GITHUB_OUTPUT"
          # Render one `type=raw,value=<channel>` line per channel for the
          # docker/metadata-action `tags:` input below.
          {
            echo "raw_tags<<EOF"
            for c in $channels; do echo "type=raw,value=$c"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          # CalVer has no semver ordering to anchor `latest` — never publish an
          # unconditional `latest`. Channels are the moving pointers instead.
          flavor: |
            latest=false
          tags: |
            # The immutable full version, from the pushed tag (no-op on main).
            type=semver,pattern={{version}}
            # One moving channel pointer per derived channel (tag pushes only).
            ${{ steps.channels.outputs.raw_tags }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: server/Dockerfile
          # Publish only when releasing (a tag push); branch builds validate
          # the image but push nothing to the registry.
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via the registry itself — no external cache service needed
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

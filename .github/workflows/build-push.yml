name: Build & Push MCP server image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  # Publishes to GitHub Container Registry under this repository's namespace,
  # e.g. ghcr.io/<owner>/quartermaster. After the first publish, set the
  # package visibility to Public in the repo's package settings.
  IMAGE: ghcr.io/${{ github.repository_owner }}/quartermaster

jobs:
  test:
    name: Test
    uses: ./.github/workflows/testing.yml

  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    # Never publish unless the backend + web-UI tests (and the dev-auth
    # dead-code-elimination guard) pass first.
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # Tag every main push with :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Strip the leading 'v' from CalVer git tags
            # Works with any number of components (e.g. v2026.3.25.1 → 2026.3.25.1)
            type=match,pattern=v(.*),group=1
            # Always add a short-SHA tag for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via the registry itself — no external cache service needed
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
